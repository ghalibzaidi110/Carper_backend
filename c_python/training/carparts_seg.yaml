# Carparts Segmentation Dataset — YOLOv8-seg training config
#
# Dataset: "Carparts Segmentation" (Roboflow / custom)
# Expected directory layout (after download):
#
#   datasets/carparts-seg/
#   ├── train/
#   │   ├── images/
#   │   └── labels/
#   ├── valid/
#   │   ├── images/
#   │   └── labels/
#   └── test/        (optional)
#       ├── images/
#       └── labels/
#
# Label format: YOLO segmentation (class_id x1 y1 x2 y2 ... xN yN)
#
# Update `path` below to point to your local dataset root.

path: ../datasets/carparts-seg
train: train/images
val: valid/images
test: test/images

# 22 classes — "object" catch-all REMOVED from training.
# Index order matches the frontend part-segmenter.ts PART_CLASS_KEYS
# (with "object" at index 18 removed and subsequent classes shifted).
nc: 22
names:
  0: back_bumper
  1: back_door
  2: back_glass
  3: back_left_door
  4: back_left_light
  5: back_light
  6: back_right_door
  7: back_right_light
  8: front_bumper
  9: front_door
  10: front_glass
  11: front_left_door
  12: front_left_light
  13: front_light
  14: front_right_door
  15: front_right_light
  16: hood
  17: left_mirror
  # 18 was "object" — DROPPED
  18: right_mirror
  19: tailgate
  20: trunk
  21: wheel
